<!doctype html>

    <div class="app-shell">

            <button class="brand brand-trigger" type="button" data-context-toggle aria-expanded="false" aria-controls="context-menu">

            <div>
              <p class="topbar-kicker">Akces NCBR</p>
              <strong id="current-view-label">Start</strong>
