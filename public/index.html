<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Akces NCBR</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#start" aria-label="Akces NCBR - start">
          <span class="brand-mark">AKCES</span>
          <span class="brand-name">Akces NCBR</span>
        </a>
        <nav class="nav-tabs" aria-label="Menu glowne">
          <button class="nav-button is-active" data-view="start">Start</button>
          <button class="nav-button" data-view="startup-card">Karta Startupu</button>
          <button class="nav-button" data-view="expenses">Wydatki</button>
          <button class="nav-button" data-view="documents">Dokumenty</button>
          <button class="nav-button" data-view="calendar">Kalendarz</button>
          <button class="nav-button" data-view="reports">Raporty</button>
          <button class="nav-button" data-view="tutorial">Samouczek</button>
          <button class="nav-button" data-view="settings">Ustawienia</button>
        </nav>
        <div class="top-context" aria-label="Kontekst danych">
          <div class="field compact">
            <label for="actor-select">Dzialam jako</label>
            <select id="actor-select"></select>
          </div>
          <div class="field compact">
            <label for="scope-select">Zakres danych</label>
            <select id="scope-select"></select>
          </div>
        </div>
      </header>

      <main class="workspace">
        <section class="content" id="app"></section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/vendor/fullcalendar/core.js"></script>
    <script src="/vendor/fullcalendar/daygrid.js"></script>
    <script src="/vendor/fullcalendar/timegrid.js"></script>
    <script src="/vendor/fullcalendar/interaction.js"></script>
    <script src="/vendor/fullcalendar/list.js"></script>
    <script src="/vendor/fullcalendar/pl.js"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
